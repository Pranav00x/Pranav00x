<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranav | Privacy Engineer </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&display=swap');

        :root {
            --bg: #0a0a0a;
            --fg: #f0f0f0;
            --dim: #555;
            --accent: #3DDC84;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .interface {
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border-color);
            background: #000;
        }

        /* HEADER */
        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 5px var(--accent);
        }

        /* SECTIONS */
        .section {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-label {
            color: var(--dim);
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* BIO */
        .bio-text {
            line-height: 1.6;
            color: #ccc;
        }

        .keyword {
            color: var(--accent);
        }

        /* LINKS LIST */
        .link-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px dashed var(--border-color);
            text-decoration: none;
            color: var(--fg);
            transition: background 0.2s;
        }

        .link-row:last-child {
            border-bottom: none;
        }

        .link-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .link-arrow {
            color: var(--dim);
        }

        .link-row:hover .link-arrow {
            color: var(--accent);
        }

        /* FOOTER */
        .footer {
            padding: 15px 20px;
            font-size: 10px;
            color: var(--dim);
            display: flex;
            justify-content: space-between;
            background: #050505;
        }
    </style>
</head>

<body>

    <div class="interface">
        <div class="header">
            <div>
                <strong>PRANAV00X</strong>
                <div style="font-size: 10px; color: var(--dim); margin-top: 5px;">SYSTEM_ID: UID_0</div>
            </div>
            <div style="font-size: 10px;">
                <span class="status-dot"></span>ONLINE
            </div>
        </div>

        <div class="section">
            <div class="section-label">Manifesto</div>
            <div class="bio-text">
                Developing <span class="keyword">privacy-focused</span> mobile environments and <span
                    class="keyword">decentralized</span> infrastructure.
                <br><br>
                Core objectives include AOSP kernel optimization, telemetry removal, and smart contract deployment.
            </div>
        </div>

        <div class="section" style="padding: 0;">
            <div class="section-label" style="padding: 20px 20px 0 20px;">Uplinks</div>

            <a href="https://github.com/Pranav00x" target="_blank" class="link-row">
                <span>GITHUB</span>
                <span class="link-arrow">-></span>
            </a>

            <a href="https://x.com/pranav0x" target="_blank" class="link-row">
                <span>X</span>
                <span class="link-arrow">-></span>
            </a>

            <a href="https://t.me/pranav0x" target="_blank" class="link-row">
                <span>MSG</span>
                <span class="link-arrow">-></span>
            </a>

            <a href="mailto:connect@pranav0x.in" class="link-row">
                <span>MAIL_RELAY</span>
                <span class="link-arrow">-></span>
            </a>
        </div>

        <div class="footer">
            <span>KEY: 0x3D...84</span>
            <span>LOC: GLOBAL</span>
        </div>
    </div>

</body>

</html>
