<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRANAV00X</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg: #000;
            --txt: #fff;
            --accent: #3DDC84;
            --glitch-1: #ff00ff;
            --glitch-2: #00ffff;
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'Space Mono', monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: left;
            padding: 20px;
        }

        /* GLITCH TEXT EFFECT */
        .glitch {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 6rem;
            line-height: 0.9;
            text-transform: uppercase;
            position: relative;
            color: var(--txt);
            margin-bottom: 20px;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 var(--glitch-1);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: 1px 0 var(--glitch-2);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(20% 0 80% 0);
            }

            20% {
                clip-path: inset(60% 0 10% 0);
            }

            40% {
                clip-path: inset(40% 0 50% 0);
            }

            60% {
                clip-path: inset(80% 0 5% 0);
            }

            80% {
                clip-path: inset(10% 0 60% 0);
            }

            100% {
                clip-path: inset(30% 0 30% 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 60% 0);
            }

            20% {
                clip-path: inset(30% 0 10% 0);
            }

            40% {
                clip-path: inset(70% 0 20% 0);
            }

            60% {
                clip-path: inset(10% 0 80% 0);
            }

            80% {
                clip-path: inset(50% 0 30% 0);
            }

            100% {
                clip-path: inset(0% 0 70% 0);
            }
        }

        .role {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 40px;
            display: inline-block;
            background: rgba(61, 220, 132, 0.1);
            padding: 5px 10px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            font-size: 1.5rem;
            text-decoration: none;
            color: #666;
            transition: all 0.3s;
            cursor: pointer;
            width: fit-content;
        }

        .nav-item:hover {
            color: var(--txt);
            padding-left: 20px;
        }

        .nav-item::before {
            content: '>';
            opacity: 0;
            margin-right: 10px;
            color: var(--accent);
            transition: 0.3s;
        }

        .nav-item:hover::before {
            opacity: 1;
        }

        /* BACKGROUND NOISE */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAA5OTkAAABMTExERERmZmYzMzMyMjJ4D30QAAAACHRSTlMAMwAys3MZM7QkUkYAAABASURBVDjLY2AYBaNgFCAAFQYwZQECHiDmAmIeIOYCYlEgFmUgFmMgFmMgFmMgFmMgFmMgFmMgFmMgFmMw4D8KAwYA+EEZ+XlE6RcAAAAASUVORK5CYII=');
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 90%);
            z-index: 2;
            pointer-events: none;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .glitch {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>

    <div class="noise"></div>
    <div class="overlay"></div>

    <div class="container">

        <div class="glitch" data-text="ROOT">ROOT</div>

            <a href="mailto:connect@pranav0x.in" class="nav-item">MAIL_DROP</a>
        </nav>
    </div>

</body>

</html>
