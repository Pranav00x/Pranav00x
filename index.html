<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRANAV00X</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg: #080808;
            --fg: #e6e6e6;
            --accent: #3DDC84;
            --border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Prevent scrolling for sleek feel */
        }

        /* --- GRID LAYOUT --- */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            /* Main content | Sidebar */
            grid-template-rows: 1fr auto;
            /* Content | Footer */
            height: 100%;
            border: 1px solid var(--border);
            margin: 20px;
        }

        /* --- SECTIONS --- */
        .main-stage {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .sidebar {
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-item {
            flex: 1;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
            color: var(--fg);
        }

        .sidebar-item:last-child {
            border-bottom: none;
        }

        .sidebar-item:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .logo-area {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #666;
        }

        h1 {
            font-size: 8vw;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 20px;
            letter-spacing: -3px;
        }

        h1 span {
            color: var(--border);
            /* Dimmed effect */
            -webkit-text-stroke: 1px var(--fg);
        }

        .subtitle {
            font-size: 1.5rem;
            max-width: 600px;
            font-weight: 300;
            color: #888;
        }

        .accent-text {
            color: var(--accent);
        }

        .footer {
            grid-column: 1 / -1;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            color: #555;
            text-transform: uppercase;
        }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                margin: 0;
                border: none;
            }

            .main-stage {
                border-right: none;
                padding: 40px 20px;
                min-height: 50vh;
            }

            h1 {
                font-size: 15vw;
            }

            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-item {
                border-right: 1px solid var(--border);
                border-bottom: none;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="grid-container">

        <!-- MAIN CONTENT AREA -->
        <div class="main-stage">
            <div class="logo-area">ID: PRANAV00X // v2.0</div>

            <h1>
                System<br>
                <span class="accent-text">Architect</span>
            </h1>

            <div class="subtitle">
                Designing trustless infrastructure and optimized mobile environments.
                <span class="accent-text">Privacy is not optional.</span>
            </div>
        </div>

        <!-- RIGHT SIDE NAVIGATION -->
        <div class="sidebar">
            <a href="https://github.com/Pranav00x" target="_blank" class="sidebar-item">
                Github ->
            </a>
            <a href="https://x.com/pranav0x" target="_blank" class="sidebar-item">
                Twitter ->
            </a>
            <a href="https://t.me/pranav0x" target="_blank" class="sidebar-item">
                Telegram ->
            </a>
            <a href="mailto:connect@pranav0x.in" class="sidebar-item">
                Email ->
            </a>
        </div>

        <!-- FOOTER INFO -->
        <div class="footer">
            <span>Specialization: AOSP / DEFI / SECURITY</span>
            <span>Loc: Global</span>
            <span>Status: Online</span>
        </div>

    </div>

</body>

</html>
