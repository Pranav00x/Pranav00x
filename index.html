<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTBOOT MODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --bg: #000;
            --text: #fff;
            --highlight: #00ff00;
            /* Green usually, sometimes blue/red depending on device */
            --header: #d32f2f;
            /* The iconic red FASTBOOT text */
            --dim: #888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            /* Phone width approx */
            padding: 20px;
        }

        /* THE ROBOT */
        .android-bot {
            width: 100px;
            margin: 0 auto 40px auto;
            display: block;
            fill: #3DDC84;
            opacity: 0.8;
        }

        /* HEADER TEXT */
        .fastboot-header {
            color: var(--header);
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(211, 47, 47, 0.5);
        }

        /* DEVICE INFO BLOCK */
        .device-info {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 40px;
        }

        .info-row {
            display: flex;
            gap: 10px;
        }

        .label {
            color: var(--text);
        }

        .value {
            color: var(--dim);
        }

        /* MENU SELECTION */
        .menu {
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .menu-instruction {
            color: var(--highlight);
            font-size: 0.75rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .menu-item {
            display: block;
            color: var(--dim);
            text-decoration: none;
            padding: 12px 15px;
            border: 1px solid #333;
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            transition: all 0.2s;
        }

        .menu-item:hover {
            border-color: var(--highlight);
            color: var(--highlight);
            background: rgba(0, 255, 0, 0.05);
            /* Simulate 'Selected' state */
        }

        .menu-item::before {
            content: 'START';
            font-size: 0.7rem;
            display: block;
            color: #555;
            font-weight: 400;
            margin-bottom: 2px;
        }

        /* Customize labels for specific links */
        .menu-item.github::before {
            content: 'BOOT TO RECOVERY';
        }

        .menu-item.twitter::before {
            content: 'REBOOT SYSTEM';
        }

        .menu-item.contact::before {
            content: 'POWER OFF';
        }

        /* The big action text */
        .action-text {
            font-size: 1.5rem;
        }

        /* GLITCH/SCANLINE OVERLAY (Optional, kept very minimal) */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            opacity: 0.2;
        }
    </style>
</head>

<body>

    <div class="scanline"></div>

    <div class="container">

        <!-- DEAD ANDROID SVG -->
        <svg class="android-bot" viewBox="0 0 24 24">
            <path
                d="M6 18c0 .55.45 1 1 1h1v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h2v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h1c.55 0 1-.45 1-1V8H6v10zM12 5c-1.1 0-2 .9-2 2h4c0-1.1-.9-2-2-2z" />
            <path d="M6 6h12v1H6z" opacity=".3" /> <!-- Open chest look -->
        </svg>

        <div class="fastboot-header">FASTBOOT MODE</div>

        <div class="device-info">
            <div class="info-row">
                <span class="label">PRODUCT_NAME -</span>
                <span class="value">PRANAV00X</span>
            </div>
            <div class="info-row">
                <span class="label">VARIANT -</span>
                <span class="value">AOSP_DEV</span>
            </div>
            <div class="info-row">
                <span class="label">BOOTLOADER -</span>
                <span class="value" style="color: #d32f2f">UNLOCKED</span>
            </div>
            <div class="info-row">
                <span class="label">BASEBAND -</span>
                <span class="value">PRIVACY_V1.0</span>
            </div>
            <div class="info-row">
                <span class="label">SECURE_BOOT -</span>
                <span class="value">DISABLED</span>
            </div>
            <div class="info-row">
                <span class="label">DEVICE_STATE -</span>
                <span class="value" style="color: #00ff00">ROOTED</span>
            </div>
        </div>

        <div class="menu">
            <div class="menu-instruction">
                VOLUME KEY TO SELECT<br>
                POWER KEY TO CONFIRM
            </div>

            <a href="https://github.com/Pranav00x" target="_blank" class="menu-item github">
                <span class="action-text">GITHUB</span>
            </a>

            <a href="https://x.com/pranav0x" target="_blank" class="menu-item twitter">
                <span class="action-text">X / TWITTER</span>
            </a>

            <a href="mailto:connect@pranav0x.in" class="menu-item contact">
                <span class="action-text">CONTACT</span>
            </a>
        </div>

    </div>

</body>

</html>
